<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0C0C0A" />
  <title>CPF Router — Offline</title>
  <style>
    :root{color-scheme:dark;--bg:#0C0C0A;--bg2:#1C1C19;--border:#2E2E2A;--text:#E4E4DA;--text2:#9A9A8E;--amber:#C8973A;--green:#4A8A50}
    *{box-sizing:border-box} html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    body{display:grid;place-items:center;padding:24px}
    .card{max-width:520px;width:100%;padding:24px;border:1px solid var(--border);border-radius:16px;background:var(--bg2)}
    h1{margin:0 0 10px;font-size:22px} p{margin:0 0 12px;line-height:1.55;color:var(--text2)}
    .pill{display:inline-block;padding:6px 10px;border-radius:999px;background:rgba(200,151,58,.12);color:var(--amber);font-size:12px;font-weight:800;letter-spacing:.08em;margin-bottom:14px}
    a{color:var(--green)}
  </style>
</head>
<body>
  <main class="card">
    <div class="pill">OFFLINE</div>
    <h1>CPF Router is available from cache.</h1>
    <p>The app shell is still here, so you can reopen the last saved state when the connection returns.</p>
    <p>Once you are back online, reload the app to resume full routing and export behavior.</p>
  </main>
</body>
</html>
