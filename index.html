<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0C0C0A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CPF Router" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>CPF Router — τ-Node Handoff Protocol</title>
  <style>
    :root {
      --bg: #0C0C0C;
      --bg-panel: #141414;
      --bg-surface: #1E1E1E;
      --border: #2A2A2A;
      --border-focus: #444444;
      --text: #F5F5F5;
      --text-dim: #B0B0B0;
      --text-muted: #808080;
      --amber: #FFB300;
      --amber-dim: #C88E00;
      --amber-bg: rgba(255, 179, 0, 0.05);
      --red: #FF5252;
      --green: #4CAF50;
      --r: 6px;
      --r-lg: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      height: 100%; 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'Inter', -apple-system, sans-serif; 
      overflow: hidden;
      line-height: 1.5;
    }

    #app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100dvh;
      max-width: 1400px;
      margin: 0 auto;
      background: var(--bg);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* HEADER */
    #header {
      padding: 12px 20px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }
    .header-row {
      display: grid;
      grid-template-columns: 140px 1fr auto auto;
      align-items: center;
      gap: 24px;
    }
    .logo {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.25em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .ache-text {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      padding: 8px 16px;
      border-radius: var(--r);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      outline: none;
      transition: all 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ache-text:focus { border-color: var(--amber); background: var(--bg); }
    .ache-text::placeholder { color: var(--text-muted); opacity: 0.8; }
    .ache-text.placeholder { color: var(--text-muted); font-style: italic; }

    .route-display {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      font-weight: 700;
      color: var(--amber);
      background: var(--amber-bg);
      padding: 8px 16px;
      border-radius: var(--r);
      border: 1px solid var(--amber-dim);
    }
    .risk-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }

    /* WORKSPACE */
    #workspace {
      display: grid;
      grid-template-columns: 1fr 340px;
      overflow: hidden;
    }
    .workspace-main {
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 40px;
      border-right: 1px solid var(--border);
      scrollbar-width: thin;
    }
    .workspace-sidebar {
      padding: 24px;
      background: var(--bg-panel);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .workspace-section { display: flex; flex-direction: column; gap: 12px; }
    .section-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .field-label-row { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
    .char-count { font-size: 10px; color: var(--text-muted); font-family: monospace; }
    
    textarea {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      padding: 14px;
      resize: vertical;
      outline: none;
      transition: all 0.2s;
      font-size: 14px;
      line-height: 1.6;
    }
    textarea:focus { border-color: var(--amber-dim); background: var(--bg); }
    textarea::placeholder { color: var(--text-muted); opacity: 0.8; }
    .input-primary { min-height: 200px; font-size: 16px; }

    .cpf-editor { display: grid; gap: 16px; }
    .cpf-field label { 
      font-size: 11px; 
      font-weight: 700; 
      color: var(--text-dim); 
      margin-bottom: 6px; 
      display: block; 
      text-transform: uppercase; 
    }
    
    /* SIDEBAR ELEMENTS */
    .sidebar-group { display: flex; flex-direction: column; gap: 16px; }
    .chips-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .chip {
      padding: 12px 8px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .chip:hover { border-color: var(--text-muted); }
    .chip.selected { border-color: var(--chip-color); background: rgba(var(--chip-color-rgb), 0.1); }
    .chip-name { font-size: 12px; font-weight: 600; color: var(--text-dim); }
    .chip.selected .chip-name { color: var(--text); }

    .checklist { display: flex; flex-direction: column; gap: 10px; }
    .check-item {
      display: flex;
      gap: 12px;
      padding: 12px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      cursor: pointer;
    }
    .check-box {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-radius: 4px;
      flex-shrink: 0;
    }
    .check-item.checked .check-box { background: var(--green); border-color: var(--green); position: relative; }
    .check-item.checked .check-box::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--bg);
      font-size: 12px;
      font-weight: 800;
    }
    .check-text { font-size: 12px; color: var(--text-dim); }
    .check-item.checked .check-text { color: var(--text); }

    /* FOOTER */
    #footer {
      padding: 16px 20px;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
    }
    .action-bar { display: flex; align-items: center; gap: 16px; }
    .btn {
      height: 44px;
      padding: 0 24px;
      border-radius: var(--r);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .btn-secondary { background: transparent; border-color: var(--border); color: var(--text-dim); }
    .btn-secondary:hover { border-color: var(--text-muted); color: var(--text); }
    .btn-primary { background: var(--amber); color: var(--bg); }
    .btn-primary:hover { background: var(--amber-dim); }
    .btn-success { background: var(--bg-surface); border-color: var(--border); color: var(--text); }
    .btn-success:hover { border-color: var(--amber-dim); }

    /* UTILS */
    .conf-badge {
      font-size: 9px;
      font-weight: 900;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--border);
      color: var(--text-muted);
      display: none;
      transition: all 0.2s;
    }
    .conf-badge.show { display: inline-block; }
    .conf-low { color: var(--red); background: rgba(255, 82, 82, 0.1); }
    .conf-mid { color: var(--amber); background: rgba(255, 179, 0, 0.1); }
    .conf-high { color: var(--green); background: rgba(76, 175, 80, 0.1); }
    .field-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .field-header label { margin-bottom: 0; }
    .parse-quality { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; }
    .paste-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    @media (max-width: 1000px) {
      #workspace { grid-template-columns: 1fr; overflow-y: auto; }
      .workspace-sidebar { width: 100%; border-top: 1px solid var(--border); }
    }
  }

  </style>
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-row">
        <span class="logo">CPF / τ-ROUTER</span>
        <div id="ache-display" class="ache-text placeholder" contenteditable="true">No anchor set — tap to set your core query</div>
        <div class="route-display">
          <span id="route-nodes">— → —</span>
          <span id="risk-indicator" class="risk-dot"></span>
        </div>
        <button type="button" id="vault-btn" class="vault-btn">VAULT</button>
      </div>
    </header>

    <main id="workspace">
      <!-- Main Panel: Input + CPF Editor -->
      <div class="workspace-main">
        <section class="workspace-section">
          <div class="field-label-row">
            <span class="section-label">INPUT FROM <span id="paste-from-label">—</span></span>
            <span id="parse-quality" class="parse-quality"></span>
            <span id="paste-char-count" class="char-count">0 chars</span>
          </div>
          <textarea id="raw-input" class="input-primary" placeholder="Paste AI output here..."></textarea>
          <div id="source-node-hint" class="paste-hint"></div>
        </section>

        <section class="workspace-section">
          <div class="section-label">CPF AUTO-STRUCTURE</div>
          <div class="cpf-editor">
            <div class="cpf-field">
              <div class="field-header">
                <label>OBJECTIVE</label>
                <span id="conf-objective" class="conf-badge"></span>
              </div>
              <textarea id="cpf-objective" rows="2" placeholder="Core goal..."></textarea>
            </div>
            <div class="cpf-field">
              <div class="field-header">
                <label>CURRENT STATE</label>
                <span id="conf-state" class="conf-badge"></span>
              </div>
              <textarea id="cpf-state" rows="4" placeholder="Established facts..."></textarea>
            </div>
            <div class="cpf-field">
              <div class="field-header">
                <label>KEY INSIGHTS</label>
                <span id="conf-insights" class="conf-badge"></span>
              </div>
              <textarea id="cpf-insights" rows="4" placeholder="Operational findings..."></textarea>
            </div>
            <div class="cpf-field">
              <div class="field-header">
                <label>UNRESOLVED QUESTIONS</label>
                <span id="conf-unresolved" class="conf-badge"></span>
              </div>
              <textarea id="cpf-unresolved" rows="2" placeholder="Ambiguities..."></textarea>
            </div>
            <div class="cpf-field">
              <div class="field-header">
                <label>NEXT TASK</label>
                <span id="conf-next" class="conf-badge"></span>
              </div>
              <textarea id="cpf-next" rows="2" placeholder="Upcoming hop instructions..."></textarea>
            </div>
          </div>
        </section>

        <section id="export-preview" class="workspace-section" style="display:none">
           <div class="section-label">PROVENANCE & PACKET PREVIEW</div>
           <div class="tag-block" id="cpf-tag-block"></div>
           <div style="height:10px"></div>
           <div class="tag-block" id="full-cpf-block" style="max-height:200px; overflow:auto"></div>
        </section>
      </div>

      <!-- Sidebar: Controls + Nodes -->
      <aside class="workspace-sidebar">
        <div class="sidebar-group">
          <div class="section-label">SOURCE</div>
          <div class="chips-grid" id="source-chips"></div>
        </div>

        <div class="sidebar-group">
          <div class="section-label">TARGET</div>
          <div class="chips-grid" id="target-chips"></div>
          <div id="routing-guard" class="routing-guard"></div>
        </div>

        <div id="checklist-area" class="sidebar-group" style="display:none">
          <div class="section-label">VERIFICATION checklist</div>
          <div class="checklist-status-row">
            <span id="checklist-status">0/0</span>
            <span id="handoff-status">NOT READY</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
          <div class="checklist" id="checklist-items"></div>
        </div>

        <div class="sidebar-group">
          <div class="section-label">OPERATOR IDENTITY</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <input type="text" id="attestor-input" placeholder="τ_UNKNOWN" 
              style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r);
              color:var(--text);padding:8px 12px;font-size:12px;outline:none;font-family:inherit"
            />
            <select id="attestor-standard" 
              style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r);
              color:var(--text);padding:8px 12px;font-size:12px;outline:none;font-family:inherit;
              appearance:none;cursor:pointer">
              <option value="manual">Manual Review</option>
              <option value="rri-v1">RRI v1 Standard</option>
              <option value="governance-audit">Governance Audit</option>
              <option value="automated">Automated Check</option>
            </select>
          </div>
        </div>
      </aside>
    </main>

    <footer id="footer">
      <div class="action-bar">
        <button type="button" class="btn btn-secondary" id="clear-btn">CLEAR</button>
        <div style="flex:1"></div>
        <button type="button" class="btn btn-success" id="copy-ai-btn">COPY FOR AI</button>
        <button type="button" class="btn btn-success" id="copy-json-btn">COPY JSON</button>
        <button type="button" class="btn btn-primary" id="next-hop-btn">NEXT HOP →</button>
      </div>
    </footer>
  </div>

  <div class="copy-toast" id="copy-toast" aria-live="polite">Copied to clipboard</div>
  
  <div id="vault-modal" style="display:none;position:fixed;inset:0;background:rgba(12,12,10,0.9);z-index:2000;padding:20px;overflow:auto;backdrop-filter:blur(4px)">
    <div style="max-width:560px;margin:0 auto;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:20px;display:flex;flex-direction:column;min-height:30vh">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div class="section-title" style="margin:0;color:var(--amber)">SESSION VAULT</div>
        <button id="close-vault-btn" style="background:none;border:none;color:var(--text);font-size:24px;line-height:1;cursor:pointer;padding:0 8px">&times;</button>
      </div>
      <div id="vault-list" style="display:flex;flex-direction:column;gap:10px"></div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
